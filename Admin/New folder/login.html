<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>RJM Archibuild - Admin Login</title>
  <meta name="description" content="Admin login page">
  <meta name="keywords" content="admin, login">

  <!-- Favicons -->
  <link href="../../assets/img/Favicon (2).ico" rel="icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/preloader.css" rel="stylesheet">
  <link href="../assets/css/login.css" rel="stylesheet">
</head>

<body>
  <div id="preloader">
    <div class="loading-spinner">
      <div class="loading-spinner-inner">
        <div class="loading-spinner-circle"></div>
        <div class="loading-spinner-circle"></div>
        <div class="loading-spinner-circle"></div>
        <div class="loading-spinner-circle"></div>
        <div class="loading-spinner-circle"></div>
      </div>
    </div>
  </div>

  <div class="login-container">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="logo">
          <img src="../../assets/img/RJM_LOGO.png" alt="RJM Archibuild Logo">
        </div>
        <h1>Admin Login</h1>
        <p>Secure access to admin panel</p>
      </div>

      <!-- Messages -->
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <!-- Login Form -->
      <form id="loginForm">

        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter your email" 
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password" 
            required
            autocomplete="current-password"
          >
        </div>

        <div class="form-options">
          <div class="remember-me">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <label for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="forgot-password" id="forgotPasswordLink">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginText">Sign In</span>
          <span class="loading" id="loadingSpinner">
            <span class="spinner"></span>Loading...
          </span>
        </button>

      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p class="secure-text">This is a secure admin area</p>
        <div class="security-info">
          <i class="bi bi-lock-fill"></i> All communications are encrypted
        </div>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/preloader.js"></script>

  <script>
    // Check if user is already logged in
    async function checkExistingSession() {
      try {
        const response = await fetch('../admin.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'check_auth' })
        });

        const data = await response.json();
        if (data.authenticated) {
          // User is already logged in, redirect to dashboard
          window.location.href = 'dashboard.html';
          return;
        }
      } catch (error) {
        console.error('Session check error:', error);
      }
    }

    // Check session when page loads
    document.addEventListener('DOMContentLoaded', checkExistingSession);

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginText = document.getElementById('loginText');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    let messageTimer = null;

    // Form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous messages
      clearMessages();

      // Validate form
      if (!emailInput.value.trim() || !passwordInput.value.trim()) {
        showError('Please fill in all fields');
        return;
      }

      // Validate email format
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(emailInput.value)) {
        showError('Please enter a valid email address');
        return;
      }

      // Show loading state
      loginBtn.disabled = true;
      loginText.style.display = 'none';
      loadingSpinner.style.display = 'block';

      try {
        // Send login request to backend
        const response = await fetch('../admin.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'login',
            email: emailInput.value,
            password: passwordInput.value,
            remember_me: document.getElementById('rememberMe').checked
          })
        });

        const data = await response.json();

        if (data.success) {
          showSuccess('Login successful! Redirecting...');
          // Replace login page in history to prevent back button
          history.replaceState(null, '', 'login.html');
          window.location.href = 'dashboard.html';
        } else {
          showError(data.message || 'Invalid email or password');
          passwordInput.value = '';
        }
      } catch (error) {
        showError('Connection error. Please try again.');
        console.error('Login error:', error);
      } finally {
        loginBtn.disabled = false;
        loginText.style.display = 'block';
        loadingSpinner.style.display = 'none';
      }
    });

    function showError(message) {
      showTimedMessage(errorMessage, `<i class="bi bi-exclamation-triangle-fill" aria-hidden="true"></i><span>${escapeHtml(message)}</span>`);
    }

    function showSuccess(message) {
      showTimedMessage(successMessage, `<i class="bi bi-check-circle-fill" aria-hidden="true"></i><span>${escapeHtml(message)}</span>`);
    }

    forgotPasswordLink.addEventListener('click', event => {
      event.preventDefault();
      showError('Please contact technical support to reset your password.');
    });

    function showTimedMessage(element, html) {
      clearMessages();
      element.innerHTML = html;
      element.classList.add('show');

      messageTimer = setTimeout(() => {
        element.classList.remove('show');
      }, 4000);
    }

    function clearMessages() {
      clearTimeout(messageTimer);
      messageTimer = null;
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[character]));
    }

    // Real-time validation feedback
    emailInput.addEventListener('blur', () => {
      if (emailInput.value && !emailInput.value.includes('@')) {
        emailInput.style.borderColor = '#dc3545';
      } else {
        emailInput.style.borderColor = '#e8e8e8';
      }
    });

    // Enter key to submit form
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loginForm.dispatchEvent(new Event('submit'));
      }
    });

    // Focus styles
    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.style.opacity = '1';
      });
    });
  </script>

</body>

</html>
